<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karakter Bouwer</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 15% 20%, #ffe082 0%, transparent 45%),
                        radial-gradient(circle at 85% 10%, #80deea 0%, transparent 40%),
                        linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #0b3b2f 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            background: rgba(2, 6, 23, 0.45);
            backdrop-filter: blur(6px);
        }
        .header-right { display: flex; gap: 8px; }
        .header-btn {
            border: none;
            background: #fef08a;
            color: #1f2937;
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
        }
        main {
            max-width: 900px;
            margin: 18px auto;
            padding: 0 14px 24px;
        }
        .panel {
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
        }
        .step-title {
            margin: 0 0 8px;
            font-size: 1.35rem;
        }
        .step-sub {
            margin: 0 0 16px;
            color: #cbd5e1;
            font-size: 0.95rem;
        }
        .choices {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        .choice {
            border: 2px solid #475569;
            background: #1e293b;
            border-radius: 12px;
            color: #e2e8f0;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            min-height: 84px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            font-weight: 700;
        }
        .choice .emoji { font-size: 1.5rem; }
        .choice.selected {
            border-color: #22d3ee;
            background: #0f766e;
            color: #ecfeff;
            transform: translateY(-2px);
        }
        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        .group {
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 10px;
            background: rgba(15, 23, 42, 0.55);
        }
        .group h4 {
            margin: 0 0 8px;
            color: #e2e8f0;
        }
        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .chip {
            border: 1px solid #64748b;
            border-radius: 999px;
            background: #1e293b;
            color: #e2e8f0;
            padding: 6px 10px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .chip.selected {
            border-color: #fb7185;
            background: #9f1239;
            color: #ffe4e6;
        }
        .actions {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }
        .actions button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .secondary { background: #334155; color: #e2e8f0; }
        .primary { background: #f43f5e; color: white; }
        input[type="text"] {
            width: 100%;
            border: 1px solid #64748b;
            border-radius: 10px;
            padding: 10px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 0.95rem;
        }
        .status { color: #bae6fd; min-height: 20px; margin: 0 0 10px; }
        .result {
            margin-top: 16px;
            border: 1px solid #334155;
            border-radius: 12px;
            background: rgba(2, 6, 23, 0.55);
            padding: 12px;
            display: none;
        }
        .result pre {
            white-space: pre-wrap;
            margin: 0;
            color: #e2e8f0;
            font-size: 0.9rem;
        }
        .progress {
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: #fde68a;
        }
    </style>
</head>
<body>
<header>
    <strong>🛠️ Karakter Bouwer</strong>
    <div class="header-right">
        <button class="header-btn" id="homeBtn">← Home</button>
        <button class="header-btn" id="logoutBtn" style="display:none;">Logout</button>
    </div>
</header>

<main>
    <div class="panel">
        <p class="progress" id="progressText">Stap 1 van 6</p>
        <h2 class="step-title" id="stepTitle">Laden...</h2>
        <p class="step-sub" id="stepSub"></p>
        <p class="status" id="statusText"></p>

        <div id="stepContainer"></div>

        <div class="actions">
            <button class="secondary" id="prevBtn">Vorige</button>
            <button class="primary" id="nextBtn">Volgende</button>
        </div>

        <div class="result" id="resultBox">
            <h3 style="margin-top:0;">Jouw Karakter</h3>
            <pre id="resultText"></pre>
        </div>
    </div>
</main>

<script src="https://alcdn.msauth.net/browser/2.32.0/js/msal-browser.min.js"></script>
<script src="/JS/auth.js"></script>
<script>
const stepContainer = document.getElementById('stepContainer');
const stepTitle = document.getElementById('stepTitle');
const stepSub = document.getElementById('stepSub');
const progressText = document.getElementById('progressText');
const statusText = document.getElementById('statusText');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const resultBox = document.getElementById('resultBox');
const resultText = document.getElementById('resultText');

const homeBtn = document.getElementById('homeBtn');
const logoutBtn = document.getElementById('logoutBtn');

let flow = null;
let currentStep = 0;
let builtCharacter = null;

const state = {
    character_type: '',
    custom_type: '',
    appearance: {
        kleur: [],
        bouw: [],
        ogen: [],
        accessoires: []
    },
    powers: [],
    personality: [],
    world: '',
    name: ''
};

function setStatus(msg) {
    statusText.textContent = msg || '';
}

function getUserId() {
    return localStorage.getItem('userId')
        || localStorage.getItem('user-id')
        || (window.msalInstance && msalInstance.getAllAccounts()[0]?.username)
        || '';
}

async function callAgent(payload) {
    const userId = getUserId();
    if (!userId) {
        throw new Error('Geen user-id gevonden. Log opnieuw in.');
    }

    const response = await fetch('https://sengfam1.azurewebsites.net/apiRequest', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'user-id': userId
        },
        body: JSON.stringify({
            type: 'character_builder',
            payload
        })
    });

    const text = await response.text();
    let data = {};
    try {
        data = JSON.parse(text);
    } catch (err) {
        throw new Error('Kon response niet lezen: ' + text);
    }

    if (!response.ok) {
        throw new Error(data.error || data.details || ('Serverfout ' + response.status));
    }

    return data;
}

function renderChoiceButton(choice, isSelected, onClick) {
    const btn = document.createElement('button');
    btn.className = 'choice' + (isSelected ? ' selected' : '');
    btn.type = 'button';
    btn.innerHTML = `<span class="emoji">${choice.emoji || '✨'}</span><span>${choice.label}</span>`;
    btn.onclick = onClick;
    return btn;
}

function toggleSingle(key, value) {
    state[key] = state[key] === value ? '' : value;
    renderCurrentStep();
}

function toggleMultiArray(arr, value, max) {
    const index = arr.indexOf(value);
    if (index >= 0) {
        arr.splice(index, 1);
    } else if (arr.length < max) {
        arr.push(value);
    }
}

function renderStepType(step) {
    const box = document.createElement('div');
    box.className = 'choices';

    step.options.forEach(option => {
        const selected = state.character_type === option.id;
        box.appendChild(renderChoiceButton(option, selected, () => {
            state.character_type = option.id;
            if (option.id !== 'zelf_verzonnen') {
                state.custom_type = '';
            }
            renderCurrentStep();
        }));
    });

    if (step.allow_custom) {
        const customBtn = renderChoiceButton({ label: 'Zelf verzonnen', emoji: '🧠' }, state.character_type === 'zelf_verzonnen', () => {
            state.character_type = 'zelf_verzonnen';
            renderCurrentStep();
        });
        box.appendChild(customBtn);
    }

    stepContainer.appendChild(box);

    if (state.character_type === 'zelf_verzonnen') {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'Bijv. ruimte-piraat, ninja-kat...';
        input.value = state.custom_type;
        input.oninput = (e) => { state.custom_type = e.target.value; };
        stepContainer.appendChild(input);
    }
}

function renderStepAppearance(step) {
    const row = document.createElement('div');
    row.className = 'row';

    Object.keys(step.groups).forEach(groupKey => {
        const group = step.groups[groupKey];
        const box = document.createElement('div');
        box.className = 'group';

        const title = document.createElement('h4');
        title.textContent = groupKey.charAt(0).toUpperCase() + groupKey.slice(1);
        box.appendChild(title);

        const chipRow = document.createElement('div');
        chipRow.className = 'chip-row';

        group.options.forEach(option => {
            const chip = document.createElement('button');
            chip.type = 'button';
            const selected = state.appearance[groupKey].includes(option.id);
            chip.className = 'chip' + (selected ? ' selected' : '');
            chip.textContent = option.label;
            chip.onclick = () => {
                toggleMultiArray(state.appearance[groupKey], option.id, group.max);
                renderCurrentStep();
            };
            chipRow.appendChild(chip);
        });

        box.appendChild(chipRow);
        row.appendChild(box);
    });

    stepContainer.appendChild(row);
}

function renderStepMulti(step, stateKey) {
    const box = document.createElement('div');
    box.className = 'choices';

    step.options.forEach(option => {
        const btn = document.createElement('button');
        btn.type = 'button';
        const selected = state[stateKey].includes(option.id);
        btn.className = 'choice' + (selected ? ' selected' : '');
        btn.innerHTML = `<span class="emoji">✨</span><span>${option.label}</span>`;
        btn.onclick = () => {
            toggleMultiArray(state[stateKey], option.id, step.max);
            renderCurrentStep();
        };
        box.appendChild(btn);
    });

    stepContainer.appendChild(box);
}

function renderStepWorld(step) {
    const box = document.createElement('div');
    box.className = 'choices';

    step.options.forEach(option => {
        const selected = state.world === option.id;
        box.appendChild(renderChoiceButton({ label: option.label, emoji: '🌍' }, selected, () => {
            toggleSingle('world', option.id);
        }));
    });

    stepContainer.appendChild(box);
}

function renderStepName() {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Typ zelf een naam (of laat leeg voor suggesties)';
    input.value = state.name;
    input.oninput = (e) => { state.name = e.target.value; };

    const suggestBtn = document.createElement('button');
    suggestBtn.type = 'button';
    suggestBtn.className = 'secondary';
    suggestBtn.textContent = '🎲 Suggesteer 3 namen';
    suggestBtn.style.marginTop = '10px';
    suggestBtn.onclick = async () => {
        try {
            setStatus('Namen bedenken...');
            const data = await callAgent({
                action: 'suggest_names',
                character_type: state.character_type,
                world: state.world,
                personality: state.personality,
                powers: state.powers,
                name: state.name
            });
            setStatus('Naam-suggesties: ' + (data.name_suggestions || []).join(', '));
        } catch (err) {
            setStatus(err.message);
        }
    };

    stepContainer.appendChild(input);
    stepContainer.appendChild(suggestBtn);
}

function renderCurrentStep() {
    if (!flow || !flow.steps || !flow.steps.length) {
        return;
    }

    resultBox.style.display = 'none';
    stepContainer.innerHTML = '';
    const step = flow.steps[currentStep];

    stepTitle.textContent = step.title;
    stepSub.textContent = step.ui_hint || '';
    progressText.textContent = `Stap ${currentStep + 1} van ${flow.steps.length}`;

    prevBtn.style.visibility = currentStep === 0 ? 'hidden' : 'visible';
    nextBtn.textContent = currentStep === flow.steps.length - 1 ? 'Karakter maken' : 'Volgende';

    if (step.id === 'soort') {
        renderStepType(step);
    } else if (step.id === 'uiterlijk') {
        renderStepAppearance(step);
    } else if (step.id === 'krachten') {
        renderStepMulti(step, 'powers');
    } else if (step.id === 'persoonlijkheid') {
        renderStepMulti(step, 'personality');
    } else if (step.id === 'wereld') {
        renderStepWorld(step);
    } else if (step.id === 'naam') {
        renderStepName();
    }
}

function validateStep(step) {
    if (step.id === 'soort') {
        if (!state.character_type) return 'Kies eerst een karaktersoort.';
        if (state.character_type === 'zelf_verzonnen' && !state.custom_type.trim()) {
            return 'Typ je zelf verzonnen karakter.';
        }
    }
    if (step.id === 'krachten' && state.powers.length < 1) return 'Kies minimaal 1 kracht.';
    if (step.id === 'persoonlijkheid' && state.personality.length !== 2) return 'Kies precies 2 eigenschappen.';
    if (step.id === 'wereld' && !state.world) return 'Kies een wereld.';
    return '';
}

async function buildCharacter() {
    setStatus('Jouw karakter wordt gebouwd...');
    const payload = {
        action: 'build_character',
        character_type: state.character_type,
        custom_type: state.custom_type,
        appearance: state.appearance,
        powers: state.powers,
        personality: state.personality,
        world: state.world,
        name: state.name
    };

    const data = await callAgent(payload);
    builtCharacter = data;

    const profile = data.character_profile || {};
    const lines = [
        `Naam: ${data.name || '-'}`,
        `Type: ${profile.type || '-'}`,
        `Krachten: ${(profile.powers || []).join(', ') || '-'}`,
        `Persoonlijkheid: ${(profile.personality || []).join(', ') || '-'}`,
        `Wereld: ${profile.world || '-'}`,
        '',
        `Verhaal-start: ${data.story_seed || '-'}`,
        '',
        'Naam suggesties: ' + (data.name_suggestions || []).join(', ')
    ];

    resultText.textContent = lines.join('\n');
    resultBox.style.display = 'block';
    setStatus('Klaar! Je karakter is gemaakt.');
}

prevBtn.onclick = () => {
    if (currentStep > 0) {
        currentStep -= 1;
        setStatus('');
        renderCurrentStep();
    }
};

nextBtn.onclick = async () => {
    const step = flow.steps[currentStep];
    const error = validateStep(step);
    if (error) {
        setStatus(error);
        return;
    }

    if (currentStep < flow.steps.length - 1) {
        currentStep += 1;
        setStatus('');
        renderCurrentStep();
        return;
    }

    try {
        await buildCharacter();
    } catch (err) {
        setStatus(err.message);
    }
};

homeBtn.onclick = () => window.location.href = '/home.html';

setTimeout(() => {
    const accounts = window.msalInstance ? msalInstance.getAllAccounts() : [];
    const hasLocalUserId = Boolean(localStorage.getItem('userId') || localStorage.getItem('user-id'));

    if (!accounts.length && !hasLocalUserId) {
        window.location.href = '/home.html';
        return;
    }

    if (accounts.length && window.msalInstance) {
        logoutBtn.style.display = 'inline-block';
        logoutBtn.onclick = () => msalInstance.logoutRedirect();
    }
}, 1200);

(async function init() {
    try {
        setStatus('Flow laden...');
        const data = await callAgent({ action: 'get_flow' });
        flow = data.flow;
        currentStep = 0;
        setStatus('');
        renderCurrentStep();
    } catch (err) {
        setStatus('Kon flow niet laden: ' + err.message);
    }
})();
</script>
</body>
</html>
