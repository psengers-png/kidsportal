<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RainyDay Club</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(to bottom, #6ec1e4, #b3e5fc);
            color: #1f2d3d;
            overflow-x: hidden;
            position: relative;
            isolation: isolate;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 11% 15%, rgba(255, 255, 255, 0.95) 0 3px, transparent 4px),
                radial-gradient(circle at 19% 10%, rgba(255, 255, 255, 0.9) 0 2px, transparent 3px),
                radial-gradient(circle at 86% 14%, rgba(255, 255, 255, 0.92) 0 3px, transparent 4px),
                radial-gradient(circle at 79% 23%, rgba(255, 255, 255, 0.85) 0 2px, transparent 3px),
                linear-gradient(116deg, rgba(255, 217, 102, 0.2) 0 18%, transparent 19% 100%),
                linear-gradient(302deg, rgba(59, 130, 246, 0.16) 0 16%, transparent 17% 100%);
            opacity: 0.75;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                repeating-radial-gradient(circle at 7% 82%, rgba(59, 130, 246, 0.22) 0 2px, transparent 2px 16px),
                repeating-radial-gradient(circle at 93% 30%, rgba(236, 72, 153, 0.18) 0 2px, transparent 2px 14px);
            opacity: 0.55;
        }

        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: repeating-linear-gradient(
                transparent,
                transparent 10px,
                rgba(255,255,255,0.3) 12px
            );
            animation: rain 0.6s linear infinite;
            opacity: 0.4;
            z-index: 1;
        }

        @keyframes rain {
            from { transform: translateY(0); }
            to { transform: translateY(12px); }
        }

        header {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header-left h1 {
            margin: 0;
            font-size: 1.6rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            height: 72px;
            width: auto;
            display: block;
        }

        @media (max-width: 768px) {
            header {
                padding: 12px 16px;
            }

            .header-logo {
                height: 52px;
            }

            .header-left h1 {
                font-size: 1.2rem;
            }
        }

        .header-btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: #e5e7eb;
            text-decoration: none;
            color: #1f2d3d;
            display: inline-block;
        }

        section {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        .login-container {
            background: rgba(255,255,255,0.9);
            border-radius: 30px;
            padding: 40px;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            color: #1f2d3d;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .info-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            padding: 12px;
            background: #f0f4f8;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background: #ffd966;
            color: #1f2d3d;
        }

        .btn-primary:hover {
            background: #facc15;
        }

        .btn-primary:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f4f8;
            color: #334155;
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .error-message {
            color: #dc2626;
            font-size: 14px;
            padding: 12px;
            background: #fef2f2;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 4px solid #dc2626;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #059669;
            font-size: 14px;
            padding: 12px;
            background: #f0fdf4;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 4px solid #059669;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #1f2d3d;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 16px;
        }

        .back-link a {
            color: #1f2d3d;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 20px 40px 40px;
            opacity: 0.7;
            font-size: 0.9rem;
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="rain"></div>

    <header>
        <div class="header-left">
            <img class="header-logo" src="Images/Logo Rainydayclub.png" alt="RainyDay Club Logo">
            <h1>Rainy Day Club</h1>
        </div>
        <div class="header-right">
            <a class="header-btn" href="/home.html">Terug naar home</a>
        </div>
    </header>

    <section>
    <div class="login-container">
        <div class="logo">
            <h1>Inloggen</h1>
            <p>Gebruik je e-mailadres om verder te gaan</p>
        </div>

        <!-- Email Form -->
        <div class="form-section active" id="emailForm">
            <div class="error-message" id="emailError"></div>
            <div class="success-message" id="emailSuccess"></div>

            <div class="form-group">
                <label for="emailInput">E-mailadres</label>
                <input 
                    type="email" 
                    id="emailInput" 
                    placeholder="jouw@email.com"
                    autocomplete="email"
                >
            </div>

            <div class="info-text">
                Vul je e-mailadres in en ga verder. De vervolgstap is voor iedereen hetzelfde.
            </div>

            <div class="button-group">
                <button class="btn-primary" id="continueBtn" onclick="handleContinueLogin()">
                    Doorgaan
                </button>
            </div>

            <div class="back-link">
                <a href="/">← Terug</a>
            </div>
        </div>

    </div>
    </section>

    <footer>
        © 2026 Rainy Day Club — Van binnen is het altijd zonnig 🌈
    </footer>

    <script src="https://alcdn.msauth.net/browser/2.32.0/js/msal-browser.min.js"></script>
    <script>
        const msalConfig = {
            auth: {
                clientId: "29dc0ff8-8b79-4291-b3bd-037f5f33c82f",
                authority: "https://kidsportal2.ciamlogin.com/4abbf94b-738e-4740-b4e7-e167dcc756ac",
                redirectUri: window.location.origin + "/home.html",
                knownAuthorities: ["kidsportal2.ciamlogin.com"],
                navigateToLoginRequestUrl: false
            },
            cache: { cacheLocation: "localStorage" }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        function showLoggedOutMessageIfNeeded() {
            const params = new URLSearchParams(window.location.search || "");
            if (params.get("loggedOut") !== "1") {
                if (params.get("ciamRequired") === "1") {
                    const emailError = document.getElementById("emailError");
                    if (emailError) {
                        emailError.textContent = "Rond eerst je Entra ID account-aanmaak af via wachtwoord-login.";
                        emailError.classList.add("show");
                    }
                    const cleanUrlCiam = window.location.origin + window.location.pathname;
                    window.history.replaceState({}, document.title, cleanUrlCiam);
                }
                return;
            }

            const emailSuccess = document.getElementById("emailSuccess");
            if (emailSuccess) {
                emailSuccess.textContent = "Je bent succesvol uitgelogd.";
                emailSuccess.classList.add("show");
            }

            const cleanUrl = window.location.origin + window.location.pathname;
            window.history.replaceState({}, document.title, cleanUrl);
        }

        function normalizeUserId(rawUserId) {
            if (!rawUserId) {
                return "";
            }
            return rawUserId.split('.')[0];
        }

        async function bootstrapCiamLogin() {
            try {
                await msalInstance.initialize();
                await msalInstance.handleRedirectPromise();

                const loginInProgress = sessionStorage.getItem("ciamLoginInProgress") === "1";
                const hasAuthResponse = window.location.hash.includes("id_token")
                    || window.location.hash.includes("code=")
                    || window.location.search.includes("code=")
                    || window.location.search.includes("state=");

                if (!loginInProgress && !hasAuthResponse) {
                    return;
                }

                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    const account = accounts[0];
                    const rawUserId = account.homeAccountId || account.localAccountId || account.username || "";
                    const userId = normalizeUserId(rawUserId);
                    const email = account.username || "";

                    if (userId) {
                        localStorage.setItem("userId", userId);
                        localStorage.setItem("user-id", userId);
                    }
                    if (email) {
                        localStorage.setItem("userEmail", email);
                    }

                    sessionStorage.removeItem("ciamLoginInProgress");

                    window.location.href = "/home.html";
                    return;
                }
            } catch (error) {
                sessionStorage.removeItem("ciamLoginInProgress");
                const emailError = document.getElementById("emailError");
                if (emailError) {
                    emailError.textContent = "CIAM login kon niet worden afgerond. Probeer opnieuw.";
                    emailError.classList.add("show");
                }
            }
        }

        async function handleContinueLogin() {
            const emailHint = (document.getElementById("emailInput")?.value || "").trim();
            const emailError = document.getElementById("emailError");
            const continueBtn = document.getElementById("continueBtn");

            emailError.classList.remove("show");
            if (!emailHint || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailHint)) {
                emailError.textContent = "Voer alstublieft een geldig e-mailadres in.";
                emailError.classList.add("show");
                return;
            }

            try {
                continueBtn.disabled = true;
                continueBtn.innerHTML = '<span class="loading"></span>Doorgaan...';
                sessionStorage.setItem("ciamLoginInProgress", "1");
                localStorage.setItem("pendingSignupEmail", emailHint);
                await msalInstance.loginRedirect({
                    redirectUri: window.location.origin + "/home.html",
                    loginHint: emailHint,
                    extraQueryParameters: { login_hint: emailHint }
                });
            } catch (error) {
                sessionStorage.removeItem("ciamLoginInProgress");
                emailError.textContent = "Inloggen met wachtwoord is mislukt. Probeer opnieuw.";
                emailError.classList.add("show");
                continueBtn.disabled = false;
                continueBtn.innerHTML = "Doorgaan";
            }
        }

        // Enter key on email
        document.getElementById("emailInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                handleContinueLogin();
            }
        });

        showLoggedOutMessageIfNeeded();
        bootstrapCiamLogin();
    </script>
</body>
</html>
