<a id="language-fab-en" href="/strikey.html" data-lang="nl" style="position:fixed;top:14px;right:14px;z-index:9999;display:inline-flex;align-items:center;justify-content:center;padding:9px 14px;border-radius:999px;background:#0f172a;color:#fff;text-decoration:none;font-weight:700;font-size:.9rem;box-shadow:0 10px 24px rgba(15,23,42,.35);">Dutch</a>

        </video>

<script src="https://alcdn.msauth.net/browser/2.32.0/js/msal-browser.min.js"></script>
<script type="module" src="/JS/auth.js"></script>

<script type="module">
setTimeout(() => {
    const userId = localStorage.getItem('userId') || localStorage.getItem('user-id');
    const statusText = document.getElementById('statusText');
    const form = document.getElementById('strikeyForm');

    form.style.display = 'block';

    if (!userId) {
        statusText.textContent = 'You are not logged in. Feel free to fill in the form; we will ask you to sign in when you generate.';
    } else {
        statusText.style.display = 'none';
    }

    window.refreshHeaderAccountMenu?.();
}, 1000);

function getStoredUserId() {
    return localStorage.getItem('userId') || localStorage.getItem('user-id') || '';
}

async function requireLoginForAction(message) {
    const userId = getStoredUserId();
    if (userId) {
        return userId;
    }

    if (typeof window.startLoginRedirectWithNotice === 'function') {
        await window.startLoginRedirectWithNotice(message);
    } else {
        window.location.href = '/en/login.html';
    }

    return '';
}

const form = document.getElementById('strikeyForm');
const onderwerpInput = document.getElementById('onderwerp');
const resultaat = document.getElementById('resultaat');
const generateBtn = document.getElementById('generateBtn');
const downloadBtn = document.getElementById('downloadBtn');
const strikeyLoadingVideo = document.getElementById('strikeyLoadingVideo');
const apiRequestEndpoints = [
    'https://sengfam2-gvfpf5hndacgbfcc.westeurope-01.azurewebsites.net/apiRequest',
    'https://sengfam2-gvfpf5hndacgbfcc.westeurope-01.azurewebsites.net/apiRequest/'
];
let currentImage = '';

function toSafeStrijkkraalTopic(input) {
    const value = (input || '').trim().toLowerCase();
    if (!value) {
        return input;
    }

    const replacementRules = [
        {
            aliases: ['stitch', 'lilo en stitch', 'lilo & stitch'],
            replacement: 'een blauwe ruimte alien met grote oren, vrolijke tekenfilmstijl'
        },
        {
            aliases: ['pikachu', 'pokemon', 'pokémon'],
            replacement: 'een geel bliksemdiertje met rode wangetjes, vrolijke cartoonstijl'
        },
        {
            aliases: ['mickey', 'minnie'],
            replacement: 'een vrolijke muis met ronde oren, klassieke tekenfilmstijl'
        },
        {
            aliases: ['mario', 'luigi'],
            replacement: 'een vrolijke game-loodgieter met pet en snor, kleurrijke cartoonstijl'
        },
        {
            aliases: ['sonic'],
            replacement: 'een snelle blauwe egel met sportieve schoenen, energieke cartoonstijl'
        },
        {
            aliases: ['spiderman', 'spider-man'],
            replacement: 'een acrobatische superheld met web-patroon pak, dynamische cartoonstijl'
        },
        {
            aliases: ['batman'],
            replacement: 'een nacht-superheld met cape en vleermuis-thema, stoere cartoonstijl'
        },
        {
            aliases: ['elsa', 'anna', 'frozen'],
            replacement: 'een ijskoningin-prinses met vlecht en sneeuwthema, magische tekenfilmstijl'
        },
        {
            aliases: ['paw patrol', 'chase', 'skye', 'marshall'],
            replacement: 'een dappere reddingspup met uniform, vrolijke animatiestijl'
        },
        {
            aliases: ['hello kitty'],
            replacement: 'een schattig wit katje met strikje, lieve kawaii-stijl'
        }
    ];

    for (const rule of replacementRules) {
        if (rule.aliases.some((alias) => value.includes(alias))) {
            return rule.replacement;
        }
    }

    return input;
}

async function postApiRequest(body, userId) {
    let lastResponse = null;
    let lastError = null;

    for (const endpoint of apiRequestEndpoints) {
        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'user-id': userId
                },
                body: JSON.stringify(body)
            });

            if (response.status === 404) {
                lastResponse = response;
                continue;
            }

            return response;
        } catch (error) {
            lastError = error;
        }
    }

    if (lastResponse) {
        return lastResponse;
    }

    throw lastError || new Error('apiRequest endpoint is not reachable');
}

function startLoadingState() {
    generateBtn.disabled = true;
    downloadBtn.style.display = 'none';
    resultaat.innerHTML = "<p style='text-align:center; color:#2563eb;'>⏳ Strikey is creating your bead pattern...</p>";
    strikeyLoadingVideo.currentTime = 0;
    const playPromise = strikeyLoadingVideo.play();
    if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => {
            strikeyLoadingVideo.style.display = 'none';
        });
    }
    strikeyLoadingVideo.style.display = 'block';
}

function stopLoadingState() {
    strikeyLoadingVideo.pause();
    strikeyLoadingVideo.currentTime = 0;
    strikeyLoadingVideo.style.display = 'none';
    generateBtn.disabled = false;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const userId = await requireLoginForAction('Log in to use Strikey.');
    if (!userId) {
        return;
    }

    const onderwerp = onderwerpInput.value.trim();
    if (!onderwerp) {
        resultaat.innerHTML = "<p style='color:#dc2626;'>Please enter a topic first.</p>";
        return;
    }

    startLoadingState();

    try {
        const safeTopic = toSafeStrijkkraalTopic(onderwerp);
        const onderwerpIsMapped = safeTopic !== onderwerp;
        let response = await postApiRequest({
            type: 'strikey',
            payload: { onderwerp: safeTopic }
        }, userId);

        let text = await response.text();
        let data;

        try {
            data = JSON.parse(text);
        } catch {
            resultaat.innerHTML = `<p style='color:#dc2626;'>Could not read response: ${text}</p>`;
            return;
        }

        if (!response.ok) {
            const detailedError =
                data?.details?.error ||
                data?.details ||
                data?.error ||
                'Something went wrong.';
            resultaat.innerHTML = `<p style='color:#dc2626;'>${detailedError}</p>`;
            return;
        }

        currentImage = data.image_data_uri || '';
        if (!currentImage) {
            resultaat.innerHTML = "<p style='color:#dc2626;'>No image received.</p>";
            return;
        }

        const currentMessage = onderwerpIsMapped
            ? "<p style='color:#0f766e; font-weight:600; margin-bottom:10px;'>Tip: this topic was automatically rewritten in a safer way to generate a result.</p>"
            : '';
        resultaat.innerHTML = `${currentMessage}<img src="${currentImage}" alt="Bead Pattern">`;
        downloadBtn.style.display = 'inline-block';
    } catch (err) {
        resultaat.innerHTML = `<p style='color:#dc2626;'>Error: ${err}</p>`;
    } finally {
        stopLoadingState();
    }
});

downloadBtn.addEventListener('click', () => {
    if (!currentImage) {
        return;
    }

    const a = document.createElement('a');
    a.href = currentImage;
    a.download = 'bead-pattern.png';
    a.click();
});
</script>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const q = (params.get('lang') || '').toLowerCase();
  if (q === 'nl' || q === 'en') {
    localStorage.setItem('rdc-lang', q);
  } else {
    localStorage.setItem('rdc-lang', 'en');
  }
  const btn = document.getElementById('language-fab-en');
  if (btn) {
    btn.addEventListener('click', function () {
      localStorage.setItem('rdc-lang', 'nl');
    });
  }
})();
</script>
