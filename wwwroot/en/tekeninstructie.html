<main>

        </div>

                <input type="text" id="onderwerp" name="onderwerp" required placeholder="e.g. crocodile">
            </div>

            <button type="button" id="downloadBtn" style="display:none;">⬇️ Download</button>
        </form>

        <video id="scetchyLoadingVideo" muted playsinline loop preload="auto">
            <source src="/Images/vid%20Sketchy.mp4" type="video/mp4">

</main>

<script src="https://alcdn.msauth.net/browser/2.32.0/js/msal-browser.min.js"></script>
<script src="https://js.stripe.com/v3/"></script>
<script type="module" src="/JS/auth.js"></script>

<script type="module">
import { msalInstance } from '/JS/auth.js';
import { startStripeCheckout } from '/JS/abonnement.js';

setTimeout(() => {
    const userId = localStorage.getItem('userId') || localStorage.getItem('user-id');
    const statusText = document.getElementById("statusText");
    const form = document.getElementById("scetchyForm");

    form.style.display = "block";

    if (!userId) {
        statusText.textContent = "You are not logged in. You can fill in the form now; we will ask you to sign in when you generate.";
    } else {
        statusText.style.display = "none";
    }

    window.refreshHeaderAccountMenu?.();
}, 1000);

function getStoredUserId() {
    return localStorage.getItem('userId') || localStorage.getItem('user-id') || '';
}

async function requireLoginForAction(message) {
    const userId = getStoredUserId();
    if (userId) {
        return userId;
    }

    if (typeof window.startLoginRedirectWithNotice === 'function') {
        await window.startLoginRedirectWithNotice(message);
    } else {
        window.location.href = '/en/login.html';
    }

    return '';
}

const abonnementBtn = document.getElementById('abonnementBtn');
if (abonnementBtn) {
    abonnementBtn.onclick = async () => {
        const accounts = msalInstance.getAllAccounts();
        const storedUserId = localStorage.getItem('userId') || localStorage.getItem('user-id') || '';
        const accountUserId = accounts.length > 0 ? (accounts[0].username || '') : '';
        const userId = storedUserId || accountUserId;
        if (!userId) return;
        const selectedPlanType = window.ensurePreferredPlanTypeSelection
            ? await window.ensurePreferredPlanTypeSelection(true)
            : 'particulier';
        localStorage.setItem('preferredPlanType', selectedPlanType);
        startStripeCheckout(userId, selectedPlanType);
    };
}

const form = document.getElementById("scetchyForm");
const resultaat = document.getElementById("resultaat");
const btn = document.getElementById("genereerBtn");
const downloadBtn = document.getElementById("downloadBtn");
const scetchyLoadingVideo = document.getElementById("scetchyLoadingVideo");

function startLoadingState() {
    btn.disabled = true;
    downloadBtn.style.display = 'none';
    resultaat.innerHTML = '<p style="text-align:center; color:#2563eb;">⏳ Scetchy is creating your drawing tutorial...</p>';
    scetchyLoadingVideo.currentTime = 0;
    const playPromise = scetchyLoadingVideo.play();
    if (playPromise && typeof playPromise.then === 'function') {
        playPromise.catch(() => {
            scetchyLoadingVideo.style.display = "none";
        });
    }
    scetchyLoadingVideo.style.display = "block";
}

function stopLoadingState() {
    scetchyLoadingVideo.pause();
    scetchyLoadingVideo.currentTime = 0;
    scetchyLoadingVideo.style.display = "none";
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const userId = await requireLoginForAction("Log in to use Scetchy.");
    if (!userId) {
        return;
    }

    startLoadingState();
    const onderwerp = form.onderwerp.value.trim();

    try {
        const res = await fetch('https://sengfam2-gvfpf5hndacgbfcc.westeurope-01.azurewebsites.net/apiRequest', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'user-id': userId
            },
            body: JSON.stringify({
                type: 'scetchy',
                payload: { onderwerp }
            })
        });

        const text = await res.text();
        if (!res.ok) {
            if (res.status === 403 && text.includes('limiet')) {
                resultaat.innerHTML = `<div style='color:#64748b; text-align:center; padding: 16px;'>You have used your 10 free requests. Choose a subscription to continue.</div>`;
                const _upgradeUserId = (localStorage.getItem('userId') || localStorage.getItem('user-id') || '').split('.')[0];
                if (window.showSubscriptionUpgradeModal) {
                    window.showSubscriptionUpgradeModal(_upgradeUserId);
                }
            } else {
                resultaat.innerHTML = `<p style='color:red;'>Error (${res.status}): ${text}</p>`;
            }
            return;
        }

        let data;
        try {
            data = JSON.parse(text);
        } catch {
            resultaat.innerHTML = `<p style='color:red;'>JSON parsing error: ${text}</p>`;
            return;
        }

        if (data.image_data_uri) {
            const img = document.createElement('img');
            img.src = data.image_data_uri;
            resultaat.innerHTML = '';
            resultaat.appendChild(img);

            downloadBtn.style.display = 'inline-block';
            downloadBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = data.image_data_uri;
                a.download = 'tekeninstructie.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
        } else {
            resultaat.innerHTML = `<p style='color:red;'>${data.error || 'Unknown error.'}</p>`;
        }
    } catch (err) {
        resultaat.innerHTML = `<p style='color:red;'>Error: ${err}</p>`;
    } finally {
        stopLoadingState();
        btn.disabled = false;
    }
});
</script>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const q = (params.get('lang') || '').toLowerCase();
  if (q === 'nl' || q === 'en') {
    localStorage.setItem('rdc-lang', q);
  } else {
    localStorage.setItem('rdc-lang', 'en');
  }
  const btn = document.getElementById('language-fab-en');
  if (btn) {
    btn.addEventListener('click', function () {
      localStorage.setItem('rdc-lang', 'nl');
    });
  }
})();
</script>
