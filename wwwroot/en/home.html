<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kids Portal - Login</title>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const queryLang = (params.get('lang') || '').toLowerCase();

            if (queryLang === 'en' || queryLang === 'nl') {
                localStorage.setItem('rdc-lang', queryLang);
                return;
            }

            localStorage.setItem('rdc-lang', 'en');
        })();
    </script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-top: 0;
            font-size: 32px;
        }
        h2 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            margin: 10px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #667eea;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
        }
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        a {
            text-decoration: none;
        }
        #optionsScreen p {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .tile-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            margin-top: 24px;
        }
        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 160px;
            height: 160px;
            background: #f3f3fa;
            border-radius: 16px;
            box-shadow: 0 2px 8px #0001;
            text-decoration: none;
            color: #333;
            font-size: 18px;
            font-weight: 600;
            transition: box-shadow 0.2s, background 0.2s;
        }
        .tile:hover {
            background: #e0e0f7;
            box-shadow: 0 6px 18px #667eea33;
        }
        .tile-icon {
            font-size: 48px;
            margin-bottom: 18px;
        }
        .tile-title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
        }
        .feedback-section {
            margin-top: 28px;
            text-align: left;
        }
        .feedback-section label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }
        #feedbackText {
            width: 100%;
            min-height: 90px;
            border-radius: 10px;
            border: 1px solid #d6d6e8;
            padding: 12px;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
            margin-bottom: 10px;
        }
        #feedbackStatus {
            font-size: 13px;
            color: #555;
            min-height: 20px;
            margin-top: 6px;
        }
        .legal-links {
            margin-top: 18px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
        }
        .legal-links a {
            color: #475569;
            text-decoration: none;
            margin: 0 8px;
        }
        .legal-links a:hover {
            text-decoration: underline;
        }
        .lang-switch {
            display: inline-block;
            margin-top: 4px;
            font-size: 14px;
            color: #475569;
            text-decoration: none;
            font-weight: 600;
        }
        .lang-switch:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- Layout container -->
    <div class="container">
        <h1>🎨 Kids Portal</h1>
        <p id="statusText">Log in to continue.</p>
        <a class="lang-switch" href="/home.html" id="switchToNl">Nederlands</a>

        <!-- Login screen -->
        <div id="loginScreen">
            <button id="loginBtn">🔐 Login</button>
        </div>

        <!-- Options screen (after login) -->
        <div id="optionsScreen" style="display:none;">
            <h2 id="welcomeText"></h2>
            <p>Choose an option:</p>
            <div class="tile-grid">
                <a href="/kleurplaat.html" class="tile">
                    <div class="tile-icon">🎨</div>
                    <div class="tile-title">Coloring Page Generator</div>
                </a>
                <a href="/challenge.html" class="tile">
                    <div class="tile-icon">🎯</div>
                    <div class="tile-title">Challenge Generator</div>
                </a>
                <a href="/moppen.html" class="tile">
                    <div class="tile-icon">😂</div>
                    <div class="tile-title">Joke Generator</div>
                </a>
                <a href="/character_builder.html" class="tile">
                    <div class="tile-icon">🛠️</div>
                    <div class="tile-title">Character Builder</div>
                </a>
                <div class="tile" style="opacity:0.9; cursor:default; position:relative; overflow:hidden;">
                    <div style="position:absolute; top:50%; left:-20%; width:140%; transform:translateY(-50%) rotate(-10deg); background:#ef4444; color:white; text-align:center; font-weight:700; padding:8px 0; z-index:2;">Coming soon</div>
                    <div class="tile-icon">🎲</div>
                    <div class="tile-title">Rollie</div>
                    <div style="font-size:13px; font-weight:600; text-align:center; max-width:135px;">Creates custom dice games.</div>
                </div>
                <div class="tile" style="opacity:0.9; cursor:default; position:relative; overflow:hidden;">
                    <div style="position:absolute; top:50%; left:-20%; width:140%; transform:translateY(-50%) rotate(-10deg); background:#ef4444; color:white; text-align:center; font-weight:700; padding:8px 0; z-index:2;">Coming soon</div>
                    <div class="tile-icon">✏️</div>
                    <div class="tile-title">Scetchy</div>
                    <div style="font-size:13px; font-weight:600; text-align:center; max-width:135px;">Creates step-by-step drawing guides.</div>
                </div>
            </div>

            <div class="feedback-section">
                <label for="feedbackText">Do you have feedback or an idea?</label>
                <textarea id="feedbackText" maxlength="500" placeholder="Type your feedback here..."></textarea>
                <button id="sendFeedbackBtn" type="button">📨 Send feedback</button>
                <div id="feedbackStatus"></div>
            </div>

            <button id="logoutBtn" style="margin-top:32px;">Logout</button>

            <div class="legal-links">
                <a href="/privacy.html">Privacy</a>
                <a href="/terms.html">Terms</a>
                <a href="/cookies.html">Cookies</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://alcdn.msauth.net/browser/2.32.0/js/msal-browser.min.js"></script>
    <script src="/JS/auth.js"></script>
    <script>
        document.getElementById('switchToNl')?.addEventListener('click', () => {
            localStorage.setItem('rdc-lang', 'nl');
        });

        const feedbackBtn = document.getElementById('sendFeedbackBtn');
        const feedbackText = document.getElementById('feedbackText');
        const feedbackStatus = document.getElementById('feedbackStatus');

        feedbackBtn?.addEventListener('click', () => {
            const text = (feedbackText?.value || '').trim();

            if (!text) {
                feedbackStatus.textContent = 'Please enter feedback first.';
                return;
            }

            const subject = encodeURIComponent('Feedback Kids Portal');
            const body = encodeURIComponent(text);
            window.location.href = `mailto:info@jouwdomein.nl?subject=${subject}&body=${body}`;
            feedbackStatus.textContent = 'Email window opened. Thanks for your feedback!';
            feedbackText.value = '';
        });
    </script>

</body>
</html>
