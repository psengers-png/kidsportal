<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=/en/index.html" />
  <link rel="canonical" href="https://www.rainydayclub.nl/en/index.html" />
  <script>
    // Preserve query string and hash when redirecting legacy EN home URL.
    (function () {
      var target = '/en/index.html' + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/en/index.html">/en/index.html</a>...</p>
</body>
</html>
