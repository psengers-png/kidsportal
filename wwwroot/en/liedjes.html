<!-- Scripts -->
<script src="https://alcdn.msauth.net/browser/2.32.0/js/msal-browser.min.js"></script>
<script src="https://js.stripe.com/v3/"></script>

<script type="module" src="/JS/auth.js"></script>

<script type="module">
let beattyPremiumAccess = false;

function getStoredUserId() {
    return localStorage.getItem('userId') || localStorage.getItem('user-id') || '';
}

async function requireLoginForAction(message) {
    const userId = getStoredUserId();
    if (userId) {
        return userId;
    }

    if (typeof window.startLoginRedirectWithNotice === 'function') {
        await window.startLoginRedirectWithNotice(message);
    } else {
        window.location.href = '/login.html';
    }

    return '';
}

function showPremiumUpgradeModal(userId) {
    if (!window.showSubscriptionUpgradeModal) {
        return;
    }

    window.showSubscriptionUpgradeModal(userId, {
        mode: 'premium',
        featureName: 'Beatty Song Maker'
    });
}

async function fetchUserStatus(userId) {
    const response = await fetch(`https://sengfam2-gvfpf5hndacgbfcc.westeurope-01.azurewebsites.net/getUserStatus?t=${Date.now()}`, {
        method: 'GET',
        headers: {
            'user-id': userId,
            'Cache-Control': 'no-cache'
        },
        cache: 'no-store'
    });

    if (!response.ok) {
        return null;
    }

    try {
        return await response.json();
    } catch (_) {
        return null;
    }
}

async function initBeattyAccess() {
    const userId = getStoredUserId();
    const statusText = document.getElementById("statusText");
    const form = document.getElementById("liedjesForm");
    const premiumBanner = document.getElementById('premiumBanner');
    const premiumUpgradeBtn = document.getElementById('premiumUpgradeBtn');

    form.style.display = 'block';
    premiumBanner.style.display = 'none';

    if (!userId) {
        beattyPremiumAccess = false;
        statusText.style.display = 'block';
        statusText.style.color = '#334155';
        statusText.textContent = 'You are not logged in. Je kunt alvast invullen; bij genereren vragen we je om in te loggen.';
        window.refreshHeaderAccountMenu?.();
        return;
    }

    const normalizedUserId = userId.split('.')[0];
    const userStatus = await fetchUserStatus(normalizedUserId);
    const hasPremium = Boolean(userStatus && userStatus.isActive);

    beattyPremiumAccess = hasPremium;
    if (!hasPremium) {
        statusText.style.display = 'block';
        statusText.style.color = '#b45309';
        statusText.textContent = 'Beatty is een Premium functie. Upgrade om liedjes te maken.';
        premiumBanner.style.display = 'block';

        premiumUpgradeBtn.onclick = () => {
            showPremiumUpgradeModal(normalizedUserId);
        };

        return;
    }

    premiumBanner.style.display = 'none';
    statusText.style.display = "none";
    window.refreshHeaderAccountMenu?.();
}

setTimeout(() => {
    initBeattyAccess();
}, 1000);

const form = document.getElementById("liedjesForm");
const audioPlayer = document.getElementById("audioPlayer");
const lyricsBox = document.getElementById("lyrics");
const beattyLoadingVideo = document.getElementById("beattyLoadingVideo");
const downloadBtn = document.getElementById("downloadBtn");
const btn = document.getElementById("genereerBtn");

const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

function renderResult(data) {
    if (data.audio_url) {
        const proxyAudioUrl = `https://sengfam2-gvfpf5hndacgbfcc.westeurope-01.azurewebsites.net/download-audio?url=${encodeURIComponent(data.audio_url)}`;
        audioPlayer.src = proxyAudioUrl;
        audioPlayer.style.display = "block";
        downloadBtn.style.display = "inline-block";
        downloadBtn.onclick = () => {
            const a = document.createElement("a");
            a.href = proxyAudioUrl;
            a.download = "liedje.mp3";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
    }

    if (data.lyrics) {
        lyricsBox.textContent = data.lyrics;
    } else {
        lyricsBox.textContent = "Geen lyrics ontvangen.";
    }
}

function startLoadingState() {
    btn.disabled = true;
    audioPlayer.style.display = "none";
    downloadBtn.style.display = "none";
    lyricsBox.style.display = "block";
    lyricsBox.textContent = "Liedje wordt aangemaakt...";
    beattyLoadingVideo.style.display = "block";
    beattyLoadingVideo.currentTime = 0;
    const playPromise = beattyLoadingVideo.play();
    if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => {});
    }
}

function stopLoadingState() {
    beattyLoadingVideo.pause();
    beattyLoadingVideo.currentTime = 0;
    beattyLoadingVideo.style.display = "none";
}

async function pollStatus(taskId, userId) {
    for (let attempt = 1; attempt <= 30; attempt += 1) {
        lyricsBox.textContent = `Liedje wordt verwerkt... (${attempt}/30)`;

        const resp = await fetch('https://sengfam2-gvfpf5hndacgbfcc.westeurope-01.azurewebsites.net/apiRequest', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'user-id': userId
            },
            body: JSON.stringify({ type: 'liedjes_status', payload: { task_id: taskId } })
        });

        const text = await resp.text();
        if (!resp.ok && resp.status !== 202) {
            lyricsBox.textContent = `Fout (${resp.status}): ${text}`;
            return null;
        }

        let data;
        try {
            data = JSON.parse(text);
        } catch (err) {
            lyricsBox.textContent = `JSON parsing error: ${text}`;
            return null;
        }

        if (resp.status === 202 || data.status === 'pending') {
            await sleep(4000);
            continue;
        }

        return data;
    }

    lyricsBox.textContent = "Timeout: liedje nog niet klaar. Probeer later opnieuw.";
    return null;
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const userId = await requireLoginForAction('Log in to Beatty te gebruiken.');
    if (!userId) {
        return;
    }

    const normalizedUserId = userId.split('.')[0];
    const userStatus = await fetchUserStatus(normalizedUserId);
    beattyPremiumAccess = Boolean(userStatus && userStatus.isActive);

    if (!beattyPremiumAccess) {
        lyricsBox.innerHTML = "<div style='color:#7c2d12; text-align:center; padding: 16px;'>Beatty is alleen beschikbaar met Premium abonnement.</div>";
        showPremiumUpgradeModal(normalizedUserId);
        return;
    }

    startLoadingState();

    const onderwerp = document.getElementById("onderwerp").value.trim();
    const stijl = document.getElementById("stijl").value.trim();
    const stemming = document.getElementById("stemming").value.trim();

    if (!onderwerp) {
        lyricsBox.textContent = "Vul een onderwerp in.";
        btn.disabled = false;
        return;
    }

    try {
        const resp = await fetch('https://sengfam2-gvfpf5hndacgbfcc.westeurope-01.azurewebsites.net/apiRequest', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'user-id': userId
            },
            body: JSON.stringify({ type: 'liedjes', payload: { onderwerp, stijl, stemming } })
        });

        const text = await resp.text();
        if (!resp.ok) {
            const normalizedError = (text || '').toLowerCase();
            const isPremiumError =
                normalizedError.includes('premium') ||
                normalizedError.includes('actief maandelijks of jaarlijks abonnement');

            if (resp.status === 403 && isPremiumError) {
                lyricsBox.innerHTML = "<div style='color:#7c2d12; text-align:center; padding: 16px;'>Beatty is alleen beschikbaar met Premium abonnement.</div>";
                showPremiumUpgradeModal(normalizedUserId);
            } else if (resp.status === 403 && normalizedError.includes('limiet')) {
                lyricsBox.innerHTML = "<div style='color:#64748b; text-align:center; padding: 16px;'>Je hebt je 10 gratis aanvragen gebruikt. Kies een abonnement om verder te gaan.</div>";
                if (window.showSubscriptionUpgradeModal) {
                    window.showSubscriptionUpgradeModal(normalizedUserId);
                }
            } else {
                lyricsBox.textContent = `Fout (${resp.status}): ${text}`;
            }
            return;
        }

        let data;
        try {
            data = JSON.parse(text);
        } catch (err) {
            lyricsBox.textContent = `JSON parsing error: ${text}`;
            return;
        }

        if (data.task_id || resp.status === 202) {
            const taskId = data.task_id || data.taskId;
            const polled = await pollStatus(taskId, userId);
            if (polled) {
                renderResult(polled);
            }
            return;
        }

        renderResult(data);
    } catch (err) {
        lyricsBox.textContent = "Fout: " + err;
    } finally {
        stopLoadingState();
        btn.disabled = false;
    }
});
</script>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const q = (params.get('lang') || '').toLowerCase();
  if (q === 'nl' || q === 'en') {
    localStorage.setItem('rdc-lang', q);
  } else {
    localStorage.setItem('rdc-lang', 'en');
  }
  const btn = document.getElementById('language-fab-en');
  if (btn) {
    btn.addEventListener('click', function () {
      localStorage.setItem('rdc-lang', 'nl');
    });
  }
})();
</script>
