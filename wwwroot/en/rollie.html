<main>

<script src="https://alcdn.msauth.net/browser/2.32.0/js/msal-browser.min.js"></script>
<script type="module" src="/JS/auth.js"></script>

<script type="module">
setTimeout(() => {
    const userId = localStorage.getItem('userId') || localStorage.getItem('user-id');
    const statusText = document.getElementById('statusText');
    const form = document.getElementById('rollieForm');

    form.style.display = 'block';

    if (!userId) {
        statusText.textContent = 'You are not logged in. You can fill in the form now; we will ask you to sign in when you generate.';
    } else {
        statusText.style.display = 'none';
    }

    window.refreshHeaderAccountMenu?.();
}, 1000);

function getStoredUserId() {
    return localStorage.getItem('userId') || localStorage.getItem('user-id') || '';
}

async function requireLoginForAction(message) {
    const userId = getStoredUserId();
    if (userId) {
        return userId;
    }

    if (typeof window.startLoginRedirectWithNotice === 'function') {
        await window.startLoginRedirectWithNotice(message);
    } else {
        window.location.href = '/en/login.html';
    }

    return '';
}

const form = document.getElementById('rollieForm');
const resultaat = document.getElementById('resultaat');
const submitBtn = form.querySelector('button[type="submit"]');
const rollieLoadingVideo = document.getElementById('rollieLoadingVideo');
const apiRequestEndpoints = [
    'https://sengfam2-gvfpf5hndacgbfcc.westeurope-01.azurewebsites.net/apiRequest',
    'https://sengfam2-gvfpf5hndacgbfcc.westeurope-01.azurewebsites.net/apiRequest/'
];

async function postApiRequest(body, userId) {
    let lastResponse = null;
    let lastError = null;

    for (const endpoint of apiRequestEndpoints) {
        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'user-id': userId
                },
                body: JSON.stringify(body)
            });

            if (response.status === 404) {
                lastResponse = response;
                continue;
            }

            return response;
        } catch (error) {
            lastError = error;
        }
    }

    if (lastResponse) {
        return lastResponse;
    }

    throw lastError || new Error('apiRequest endpoint niet bereikbaar');
}

function startLoadingState() {
    submitBtn.disabled = true;
    resultaat.innerHTML = "<p style='text-align:center; color:#2563eb;'>⏳ Rollie verzint een dobbelspel...</p>";
    rollieLoadingVideo.currentTime = 0;
    const playPromise = rollieLoadingVideo.play();
    if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => {
            rollieLoadingVideo.style.display = 'none';
        });
    }
    rollieLoadingVideo.style.display = 'block';
}

function stopLoadingState() {
    rollieLoadingVideo.pause();
    rollieLoadingVideo.currentTime = 0;
    rollieLoadingVideo.style.display = 'none';
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const userId = await requireLoginForAction('Log in to use Rollie.');
    if (!userId) {
        return;
    }

    startLoadingState();

    const payload = {
        aantal_spelers: document.getElementById('aantal_spelers').value,
        energie_niveau: document.getElementById('energie_niveau').value
    };

    try {
        const resp = await postApiRequest({
            type: 'rollie',
            payload
        }, userId);

        const text = await resp.text();

        if (!resp.ok) {
            resultaat.innerHTML = `<p style='color:#dc2626;'>Error (${resp.status}): ${text}</p>`;
            return;
        }

        let data;
        try {
            data = JSON.parse(text);
        } catch {
            resultaat.innerHTML = `<p style='color:#dc2626;'>Kon antwoord niet lezen: ${text}</p>`;
            return;
        }

        resultaat.innerHTML = `<div class="result-box">${data.spel || 'No game received.'}</div>`;
    } catch (error) {
        resultaat.innerHTML = `<p style='color:#dc2626;'>Error: ${error}</p>`;
    } finally {
        stopLoadingState();
        submitBtn.disabled = false;
    }
});
</script>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const q = (params.get('lang') || '').toLowerCase();
  if (q === 'nl' || q === 'en') {
    localStorage.setItem('rdc-lang', q);
  } else {
    localStorage.setItem('rdc-lang', 'en');
  }
  const btn = document.getElementById('language-fab-en');
  if (btn) {
    btn.addEventListener('click', function () {
      localStorage.setItem('rdc-lang', 'nl');
    });
  }
})();
</script>
